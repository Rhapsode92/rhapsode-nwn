    <div class="footer-contact">
      <a href="mailto:contact@rhapsode.es"><i class="fa-solid fa-envelope"></i> contact@rhapsode.es</a>

    <div class="footer-signature">
      <p>
        &copy; {{ now.Format "2006" }} 
        <img src="/images/logo.webp" alt="Sello Rhapsode" class="footer-mini-logo">
        <span class="brand-name">Rhapsode</span> - Forjando ideas en el NWN desde 2002.
      </p>
    </div>
  </div>
  
  <div class="nwn-music-container">
      <div class="nwn-music-controls">
          <button id="music-toggle" class="gem-button" onclick="toggleMusic()">
              <i id="music-icon" class="fas fa-gem"></i>
              <div class="gem-glow"></div>
          </button>
          <button id="next-track" class="next-button" onclick="nextTrack()">
              <i class="fas fa-step-forward"></i>
          </button>
      </div>
      <audio id="bg-music" onended="nextTrack()">
          <source id="audio-source" src="/music/echoes.mp3" type="audio/mpeg">
      </audio>
  </div>

  <script>
/* --- SCRIPT MENÚ HAMBURGUESA --- */
document.addEventListener('DOMContentLoaded', function() {
    const toggle = document.querySelector('.menu-toggle');
    const menu = document.querySelector('.nav-menu');

    if (toggle && menu) {
        toggle.addEventListener('click', function(e) {
            e.preventDefault();
            menu.classList.toggle('show');
            
            const icon = toggle.querySelector('i');
            if (menu.classList.contains('show')) {
                icon.className = 'fas fa-times'; // Cambia a X
            } else {
                icon.className = 'fas fa-bars'; // Vuelve a hamburguesa
            }
        });
    }
});
    /* --- SCRIPT REPRODUCTOR DE MÚSICA --- */
    const playlist = ["/music/echoes.mp3", "/music/silent.mp3"];
    let currentTrack = 0;
    const audio = document.getElementById('bg-music');
    const source = document.getElementById('audio-source');
    const btnMusic = document.getElementById('music-toggle');

    function toggleMusic() {
        const iconMusic = document.getElementById('music-icon');
        if (audio.paused) {
            audio.play();
            btnMusic.classList.add('active');
            iconMusic.className = 'fas fa-music';
        } else {
            audio.pause();
            btnMusic.classList.remove('active');
            iconMusic.className = 'fas fa-gem';
        }
    }

    function nextTrack() {
        currentTrack = (currentTrack + 1) % playlist.length;
        source.src = playlist[currentTrack];
        audio.load();
        if (btnMusic.classList.contains('active')) { audio.play(); }
    }
  </script>
</footer>
